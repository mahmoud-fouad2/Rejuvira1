services:
  - type: web
    name: rejuvera-center-web
    runtime: node
    plan: starter
    rootDir: .
    autoDeploy: true
    healthCheckPath: /api/health
    buildCommand: npm ci --include=dev --no-audit --no-fund && npx prisma generate && npm run prisma:migrate:deploy:retry && npm run seed:core && npm run build
    startCommand: npm run seed:core && npm run start:standalone
    envVars:
      - key: NODE_VERSION
        value: 22.19.0
      - key: HOSTNAME
        value: 0.0.0.0
      - key: IMAGE_UNOPTIMIZED
        value: "1"
      - key: NEXT_TELEMETRY_DISABLED
        value: "1"
      - key: MAX_OLD_SPACE_SIZE
        value: "384"
      # Database
      - key: PRISMA_MIGRATE_DEPLOY_RETRIES
        value: 10
      - key: PRISMA_MIGRATE_DEPLOY_RETRY_DELAY_MS
        value: 30000
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      # Auth.js / NextAuth: trust the current request host. Do not pin
      # NEXTAUTH_URL/AUTH_URL because this app serves multiple domains.
      - key: AUTH_TRUST_HOST
        value: "true"
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: AUTH_SECRET
        sync: false
      # Canonical site URL for SEO, sitemap, robots, and OG.
      - key: SITE_URL
        value: https://rejuvera.sa
      # Cloudflare R2
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ENDPOINT
        sync: false
      - key: R2_BUCKET
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_PUBLIC_BASE_URL
        sync: false
      # reCAPTCHA v3
      - key: RECAPTCHA_SITE_KEY
        sync: false
      - key: RECAPTCHA_SECRET_KEY
        sync: false
      - key: NEXT_PUBLIC_RECAPTCHA_SITE_KEY
        sync: false
      - key: RECAPTCHA_STRICT
        value: "0"
      # Optional contact seeds
      - key: CONTACT_PHONE_PRIMARY
        sync: false
      - key: CONTACT_PHONE_SECONDARY
        sync: false
      - key: CONTACT_EMAIL_PRIMARY
        sync: false
      - key: CONTACT_EMAIL_SECONDARY
        sync: false
      # Optional maps embed seed
      - key: GOOGLE_MAPS_EMBED_URL
        sync: false

# Optional: a nightly backup cron that POSTs to the running web service
# `/api/admin/backup` endpoint. Replace `<BACKUP_TOKEN>` with the value
# set in environment as `BACKUP_TRIGGER_TOKEN` to protect the endpoint.
# Uncomment when you are ready to enable scheduled backups.
#
# - type: cron
#   name: rejuvera-nightly-backup
#   runtime: docker
#   schedule: "30 1 * * *"
#   dockerCommand: |
#     curl -sS -X POST \
#       -H "Authorization: Bearer $BACKUP_TRIGGER_TOKEN" \
#       https://rejuvera.sa/api/admin/backup
#   envVars:
#     - key: BACKUP_TRIGGER_TOKEN
#       sync: false
