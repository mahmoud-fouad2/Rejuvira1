services:
  - type: web
    name: rejuvira-center-web
    runtime: node
    plan: starter
    rootDir: .
    autoDeploy: true
    healthCheckPath: /api/health
    buildCommand: npm install --no-audit --no-fund && npm run prisma:generate && npm run build
    startCommand: npm run prisma:migrate:deploy && npm run start
    envVars:
      - key: NODE_VERSION
        value: 22.19.0
      - key: DATABASE_URL
        fromDatabase:
          name: rejuvira-center-db
          property: connectionString
      - key: AUTH_URL
        value: https://rejuvira-center-web.onrender.com
      - key: AUTH_SECRET
        generateValue: true
      - key: NEXT_TELEMETRY_DISABLED
        value: "1"

databases:
  - name: rejuvira-center-db
    plan: starter
    databaseName: rejuvira_center
    user: rejuvira_center
